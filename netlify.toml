[build]
  publish = "."
  functions = "netlify/functions"

# Timeout fonctions à 26s (max synchrone Netlify)
[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
